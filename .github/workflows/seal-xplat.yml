name: seal-xplat

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Stage module files
        shell: bash
        run: |
          cp vendor.mod go.mod
          cp vendor.sum go.sum
      - name: Test
        shell: bash
        run: |
          SKIP="TestImpliedDirectoryPermissions"
          if [ "$RUNNER_OS" = "macOS" ]; then
            SKIP="TestImpliedDirectoryPermissions|TestChangesWithChangesGH13590|TestApplyLayer"
          fi
          go test -mod=vendor -count=1 -short -timeout 15m -skip "$SKIP" \
            ./client/... ./errdefs/... ./opts/... ./pkg/archive/... \
            ./pkg/homedir/... ./pkg/idtools/... ./pkg/jsonmessage/... \
            ./pkg/namesgenerator/... ./pkg/stdcopy/... ./pkg/stringid/... \
            ./pkg/tailfile/... ./api/types/...
